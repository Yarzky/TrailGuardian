name: trail_guardian_r02
description: "Sistema de Rastreamento de Trilha - Versão R02"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Ícones padrão
  cupertino_icons: ^1.0.6

  # 🗺️ Mapas e Localização
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # 📡 Comunicação com o Broker MQTT
  mqtt_client: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 🖼️ Registro da Imagem de Fundo
  assets:
    - assets/logo.jpeg
